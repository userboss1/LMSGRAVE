# NOTE: Replace '/var/www/lmsgrave' with the absolute path where you cloned this repository.

server {
    listen 80;
    server_name _;

    root /var/www/lmsgrave/client/dist;
    index index.html;

    client_max_body_size 10M;

 
    location / {
        try_files $uri $uri/ /index.html;
    }

  
    location /api/ {
        proxy_pass http://localhost:5000/;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
    }

   
    location /uploads/ {
        alias /var/www/lmsgrave/server/uploads/;

        expires 30d;
        add_header Cache-Control "public";
        add_header X-Served-By "nginx-static";
    }

   
    location ~* \.(js|css|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public";
        access_log off;
    }

    
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

  
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
}